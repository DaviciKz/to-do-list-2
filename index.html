<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #2d1b69 0%, #11998e 0%, #1a0533 30%, #0d1b4b 70%, #0a0a1a 100%);
      background: linear-gradient(135deg, #1a0533 0%, #0d1b4b 50%, #0a0a2e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      gap: 20px;
    }

    /* ─── HEADER ─────────────────────────────────────────────── */
    .header-card {
      width: 100%;
      max-width: 960px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      padding: 32px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .greeting {
      font-size: 1rem;
      font-weight: 500;
      color: #7c3aed;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .clock {
      font-size: 3.5rem;
      font-weight: 700;
      color: #1e1b4b;
      letter-spacing: 0.04em;
      line-height: 1;
    }

    .date-display {
      font-size: 1rem;
      font-weight: 400;
      color: #6b7280;
    }

    /* ─── MIDDLE ROW ─────────────────────────────────────────── */
    .middle-row {
      width: 100%;
      max-width: 960px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 640px) {
      .middle-row { grid-template-columns: 1fr; }
      .clock { font-size: 2.5rem; }
      .header-card { padding: 24px 20px; }
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      padding: 28px 28px;
    }

    .card-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: #7c3aed;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    /* ─── FOCUS TIMER ────────────────────────────────────────── */
    .timer-display {
      font-size: 4rem;
      font-weight: 700;
      color: #1e1b4b;
      text-align: center;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
      line-height: 1;
    }

    .timer-label {
      text-align: center;
      font-size: 0.8rem;
      color: #9ca3af;
      margin-bottom: 24px;
    }

    .timer-progress-wrap {
      width: 100%;
      height: 6px;
      background: #ede9fe;
      border-radius: 99px;
      margin-bottom: 24px;
      overflow: hidden;
    }

    .timer-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #6d28d9);
      border-radius: 99px;
      transition: width 1s linear;
      width: 100%;
    }

    .timer-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .btn {
      padding: 10px 22px;
      border: none;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn:active { transform: scale(0.97); }

    .btn-purple {
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: #ffffff;
    }

    .btn-purple:hover { background: linear-gradient(135deg, #6d28d9, #5b21b6); }

    .btn-outline {
      background: transparent;
      color: #7c3aed;
      border: 2px solid #ddd6fe;
    }

    .btn-outline:hover { background: #ede9fe; }

    .btn-danger {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: #ffffff;
      padding: 6px 12px;
      font-size: 0.75rem;
      border-radius: 8px;
      flex-shrink: 0;
    }

    .btn-danger:hover { background: linear-gradient(135deg, #dc2626, #b91c1c); }

    /* ─── TO-DO LIST ─────────────────────────────────────────── */
    .task-input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .input-field {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      color: #1f2937;
      outline: none;
      transition: border-color 0.15s;
    }

    .input-field:focus { border-color: #7c3aed; }
    .input-field::placeholder { color: #d1d5db; }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 220px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .task-list::-webkit-scrollbar { width: 4px; }
    .task-list::-webkit-scrollbar-track { background: #f3f4f6; border-radius: 99px; }
    .task-list::-webkit-scrollbar-thumb { background: #c4b5fd; border-radius: 99px; }

    .task-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #faf5ff;
      border: 1px solid #ede9fe;
      border-radius: 10px;
      padding: 10px 12px;
      transition: opacity 0.2s;
    }

    .task-item input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #7c3aed;
      cursor: pointer;
      flex-shrink: 0;
    }

    .task-text {
      flex: 1;
      font-size: 0.875rem;
      color: #374151;
      word-break: break-word;
    }

    .task-text.done {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .task-empty {
      text-align: center;
      color: #d1d5db;
      font-size: 0.85rem;
      padding: 20px 0;
    }

    /* ─── QUICK LINKS ────────────────────────────────────────── */
    .bottom-card {
      width: 100%;
      max-width: 960px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      padding: 28px 28px;
    }

    .link-input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .link-input-row .input-field { flex: 1; min-width: 120px; }

    .links-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .link-chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: #ffffff;
      border-radius: 10px;
      padding: 9px 14px;
      font-size: 0.85rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.15s ease;
      cursor: pointer;
    }

    .link-chip:hover { background: linear-gradient(135deg, #6d28d9, #5b21b6); transform: translateY(-1px); }

    .link-chip-delete {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      background: rgba(255,255,255,0.25);
      border-radius: 50%;
      border: none;
      color: #ffffff;
      font-size: 0.7rem;
      font-weight: 700;
      cursor: pointer;
      line-height: 1;
      transition: background 0.15s;
      font-family: 'Inter', sans-serif;
    }

    .link-chip-delete:hover { background: rgba(255,255,255,0.5); }

    .links-empty {
      color: #d1d5db;
      font-size: 0.85rem;
    }

    /* ─── FOOTER ─────────────────────────────────────────────── */
    .footer {
      color: rgba(255,255,255,0.3);
      font-size: 0.75rem;
      padding-bottom: 8px;
    }
  </style>
</head>
<body>

  <!-- ═══ HEADER ═══════════════════════════════════════════════ -->
  <div class="header-card">
    <div class="greeting" id="greeting">Good Morning</div>
    <div class="clock" id="clock">00:00:00</div>
    <div class="date-display" id="dateDisplay">Minggu, 1 Januari 2025</div>
  </div>

  <!-- ═══ MIDDLE ROW ════════════════════════════════════════════ -->
  <div class="middle-row">

    <!-- Focus Timer -->
    <div class="card">
      <div class="card-title">⏱ Focus Timer</div>
      <div class="timer-display" id="timerDisplay">25:00</div>
      <div class="timer-label" id="timerLabel">DaviciKz · 25 minutes</div>
      <div class="timer-progress-wrap">
        <div class="timer-progress-bar" id="timerBar"></div>
      </div>
      <div class="timer-buttons">
        <button class="btn btn-purple" id="timerStartBtn" onclick="timerStart()">Start</button>
        <button class="btn btn-outline" onclick="timerStop()">Pause</button>
        <button class="btn btn-outline" onclick="timerReset()">Reset</button>
      </div>
    </div>

    <!-- To-Do List -->
    <div class="card">
      <div class="card-title">✅ Tasks</div>
      <div class="task-input-row">
        <input class="input-field" type="text" id="taskInput" placeholder="Add a new task..." onkeydown="if(event.key==='Enter') addTask()" />
        <button class="btn btn-purple" onclick="addTask()">Add</button>
      </div>
      <div class="task-list" id="taskList">
        <div class="task-empty" id="taskEmpty">No tasks yet. Add one above!</div>
      </div>
    </div>

  </div>

  <!-- ═══ QUICK LINKS ════════════════════════════════════════════ -->
  <div class="bottom-card">
    <div class="card-title">🔗 Quick Links</div>
    <div class="link-input-row">
      <input class="input-field" type="text" id="linkName" placeholder="Link name" />
      <input class="input-field" type="url" id="linkUrl" placeholder="https://..." onkeydown="if(event.key==='Enter') addLink()" />
      <button class="btn btn-purple" onclick="addLink()">Add Link</button>
    </div>
    <div class="links-grid" id="linksGrid">
      <!-- default links injected by JS -->
    </div>
  </div>

  <div class="footer">Life Dashboard · Built with ♥</div>

  <script>
    // ═══════════════════════════════════════════════════════════
    //  CLOCK & DATE
    // ═══════════════════════════════════════════════════════════
    const DAYS   = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
    const MONTHS = ['Januari','Februari','Maret','April','Mei','Juni','Juli',
                    'Agustus','September','Oktober','November','Desember'];

    function updateClock() {
      const now = new Date();
      const h   = String(now.getHours()).padStart(2,'0');
      const m   = String(now.getMinutes()).padStart(2,'0');
      const s   = String(now.getSeconds()).padStart(2,'0');

      document.getElementById('clock').textContent = `${h}:${m}:${s}`;

      const day   = DAYS[now.getDay()];
      const date  = now.getDate();
      const month = MONTHS[now.getMonth()];
      const year  = now.getFullYear();
      document.getElementById('dateDisplay').textContent = `${day}, ${date} ${month} ${year}`;

      const hour = now.getHours();
      let greet;
      if (hour >= 5  && hour < 12) greet = '☀️  Good Morning';
      else if (hour >= 12 && hour < 17) greet = '🌤️  Good Afternoon';
      else if (hour >= 17 && hour < 21) greet = '🌇  Good Evening';
      else greet = '🌙  Good Night';
      document.getElementById('greeting').textContent = greet;
    }

    updateClock();
    setInterval(updateClock, 1000);


    // ═══════════════════════════════════════════════════════════
    //  POMODORO TIMER
    // ═══════════════════════════════════════════════════════════
    const TOTAL_SECONDS = 25 * 60;
    let timerRemaining  = TOTAL_SECONDS;
    let timerInterval   = null;
    let timerRunning    = false;

    function renderTimer() {
      const m = String(Math.floor(timerRemaining / 60)).padStart(2, '0');
      const s = String(timerRemaining % 60).padStart(2, '0');
      document.getElementById('timerDisplay').textContent = `${m}:${s}`;

      const pct = (timerRemaining / TOTAL_SECONDS) * 100;
      document.getElementById('timerBar').style.width = pct + '%';

      if (timerRemaining === 0) {
        document.getElementById('timerLabel').textContent = '🎉 Time\'s up! Take a break.';
        timerStop();
      }
    }

    function timerStart() {
      if (timerRunning || timerRemaining === 0) return;
      timerRunning = true;
      document.getElementById('timerLabel').textContent = '▶ Focus mode active…';
      document.getElementById('timerStartBtn').textContent = 'Running';
      timerInterval = setInterval(() => {
        timerRemaining--;
        renderTimer();
      }, 1000);
    }

    function timerStop() {
      clearInterval(timerInterval);
      timerRunning = false;
      document.getElementById('timerStartBtn').textContent = 'Start';
      if (timerRemaining > 0) {
        document.getElementById('timerLabel').textContent = '⏸ Paused';
      }
    }

    function timerReset() {
      timerStop();
      timerRemaining = TOTAL_SECONDS;
      document.getElementById('timerLabel').textContent = 'Pomodoro · 25 minutes';
      renderTimer();
    }

    renderTimer();


    // ═══════════════════════════════════════════════════════════
    //  TO-DO LIST
    // ═══════════════════════════════════════════════════════════
    let tasks = JSON.parse(localStorage.getItem('ld_tasks') || '[]');

    function saveTasks() {
      localStorage.setItem('ld_tasks', JSON.stringify(tasks));
    }

    function renderTasks() {
      const list  = document.getElementById('taskList');
      const empty = document.getElementById('taskEmpty');

      // remove all task items (keep empty placeholder)
      Array.from(list.querySelectorAll('.task-item')).forEach(el => el.remove());

      if (tasks.length === 0) {
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      tasks.forEach((task, idx) => {
        const item = document.createElement('div');
        item.className = 'task-item';

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = task.done;
        cb.addEventListener('change', () => {
          tasks[idx].done = cb.checked;
          saveTasks();
          renderTasks();
        });

        const txt = document.createElement('span');
        txt.className = 'task-text' + (task.done ? ' done' : '');
        txt.textContent = task.text;

        const del = document.createElement('button');
        del.className = 'btn btn-danger';
        del.textContent = 'Delete';
        del.addEventListener('click', () => {
          tasks.splice(idx, 1);
          saveTasks();
          renderTasks();
        });

        item.appendChild(cb);
        item.appendChild(txt);
        item.appendChild(del);
        list.appendChild(item);
      });
    }

    function addTask() {
      const input = document.getElementById('taskInput');
      const text  = input.value.trim();
      if (!text) { input.focus(); return; }
      tasks.push({ text, done: false });
      saveTasks();
      renderTasks();
      input.value = '';
      input.focus();
    }

    renderTasks();


    // ═══════════════════════════════════════════════════════════
    //  QUICK LINKS
    // ═══════════════════════════════════════════════════════════
    const DEFAULT_LINKS = [
      { name: 'Google',   url: 'https://www.google.com' },
      { name: 'Gmail',    url: 'https://mail.google.com' },
      { name: 'Calendar', url: 'https://calendar.google.com' },
    ];

    let links = JSON.parse(localStorage.getItem('ld_links') || 'null');
    if (!links) { links = DEFAULT_LINKS; saveLinks(); }

    function saveLinks() {
      localStorage.setItem('ld_links', JSON.stringify(links));
    }

    function renderLinks() {
      const grid = document.getElementById('linksGrid');
      grid.innerHTML = '';

      if (links.length === 0) {
        grid.innerHTML = '<span class="links-empty">No links yet. Add one above!</span>';
        return;
      }

      links.forEach((link, idx) => {
        const chip = document.createElement('a');
        chip.className = 'link-chip';
        chip.href   = link.url;
        chip.target = '_blank';
        chip.rel    = 'noopener noreferrer';

        const nameSpan = document.createElement('span');
        nameSpan.textContent = link.name;

        const delBtn = document.createElement('button');
        delBtn.className = 'link-chip-delete';
        delBtn.textContent = '✕';
        delBtn.title = 'Remove';
        delBtn.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          links.splice(idx, 1);
          saveLinks();
          renderLinks();
        });

        chip.appendChild(nameSpan);
        chip.appendChild(delBtn);
        grid.appendChild(chip);
      });
    }

    function addLink() {
      const nameEl = document.getElementById('linkName');
      const urlEl  = document.getElementById('linkUrl');
      let name = nameEl.value.trim();
      let url  = urlEl.value.trim();

      if (!name || !url) {
        if (!name) nameEl.focus();
        else urlEl.focus();
        return;
      }

      // auto-prepend https if missing
      if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

      links.push({ name, url });
      saveLinks();
      renderLinks();
      nameEl.value = '';
      urlEl.value  = '';
      nameEl.focus();
    }

    renderLinks();
  </script>
</body>
</html>
